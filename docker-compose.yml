services:
  db:
    image: mysql:8.0
    container_name: ahweb-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-prod_root_pass_99}
      MYSQL_DATABASE: ahweb
      MYSQL_USER: user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-prod_db_pass_77}
    # REMOVED port 3306 for security in production
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ahweb-phpmyadmin
    restart: always
    # Consider disabling phpMyAdmin in production or protecting it
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-prod_root_pass_99}
    depends_on:
      - db

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ahweb-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ahweb
      MYSQL_USER: user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-prod_db_pass_77}
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_this_admin_pass}
      SECRET_KEY: ${SECRET_KEY:-high_entropy_secret_key_882299}
      BACKEND_PUBLIC_HOST: "http://192.168.43.239:8000"
      ALLOWED_ORIGINS: "http://192.168.43.239:8080,http://localhost:8080" # Add your domain here
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ahweb-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db_data:
  uploads_data:
