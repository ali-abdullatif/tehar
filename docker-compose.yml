services:
  db:
    image: mysql:8.0
    container_name: tihar-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-prod_root_pass_99}
      MYSQL_DATABASE: tihar
      MYSQL_USER: user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-prod_db_pass_77}
    # Using local folder for absolute database persistence
    volumes:
      - ./db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: tihar-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-prod_root_pass_99}
    depends_on:
      - db

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tihar-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: tihar
      MYSQL_USER: user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-prod_db_pass_77}
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_this_admin_pass}
      SECRET_KEY: ${SECRET_KEY:-high_entropy_secret_key_882299}
      BACKEND_PUBLIC_HOST: "http://tihar.site:8000"
      ALLOWED_ORIGINS: "http://tihar.site,http://localhost:8080,http://localhost"
    # Using local folder for image uploads persistence
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tihar-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
