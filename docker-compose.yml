services:
  db:
    image: mysql:8.0
    container_name: ahweb-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ahweb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ahweb-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - db

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ahweb-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ahweb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      SECRET_KEY: "super-secret-jwt-key-change-me-in-production"
      BACKEND_PUBLIC_HOST: "http://localhost:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ahweb-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db_data:
  uploads_data:
